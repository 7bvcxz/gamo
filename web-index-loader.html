<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Loading game</title>
  <style>
    html, body { height: 100%; margin: 0; background: #09110e; color: #dce9df; }
    body { display: grid; place-items: center; font: 14px sans-serif; }
  </style>
</head>
<body>
  <span>Loading...</span>
  <script>
    fetch(`version.json?t=${Date.now()}`, { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`Version request failed: ${response.status}`);
        return response.json();
      })
      .then(({ page }) => location.replace(new URL(page, location.href)))
      .catch((error) => {
        console.error(error);
        document.body.textContent = "Unable to load the latest build.";
      });
  </script>
</body>
</html>
